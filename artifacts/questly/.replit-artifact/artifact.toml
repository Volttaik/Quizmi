kind = "web"
previewPath = "/"
title = "Quizmi"
version = "1.0.0"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/questly run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/questly", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/questly", "run", "start"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"
