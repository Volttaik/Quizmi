kind = "web"
previewPath = "/"
title = "Quizmi — Study Reimagined"
version = "1.0.0"
id = "artifacts/questly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20698

[services.development]
run = "pnpm --filter @workspace/questly run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/questly", "run", "build"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/questly", "run", "start"]

[services.production.run.env]
PORT = "20698"
NODE_ENV = "production"

[services.env]
PORT = "20698"
