kind = "web"
previewPath = "/"
title = "Questly"
version = "1.0.0"
id = "artifacts/questly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20698

[services.development]
run = "pnpm --filter @workspace/questly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/questly", "run", "build" ]
run = "pnpm --filter @workspace/questly run start"

[services.env]
PORT = "20698"
BASE_PATH = "/"
